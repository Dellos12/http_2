services:
  # 1. A ÂNCORA: Memória Física (Postgres + pgvector)
  postgres:
    image: ankane/pgvector:latest
    container_name: postgres_hiperplano
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: hiperplano_db
      POSTGRES_USER: devildev
      POSTGRES_PASSWORD: password_quantica
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devildev -d hiperplano_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks: [fenda_sinaptica]

  # 2. O POTENCIAL: Repouso e Telemetria (Redis)
  redis:
    image: redis:alpine
    container_name: redis_frequencia
    ports: ["6379:6379"]
    networks: [fenda_sinaptica]

  # 3. O GOVERNADOR: Motor Quântico (Ruby on Rails)
  motor_quantico:
    build: 
      context: .
      dockerfile: ./motor_quantico/Dockerfile
    container_name: rails_governanca
    working_dir: /rails
    # Usamos o bundle exec para garantir que o Rails encontre o binário no PATH
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    volumes:
      - ./motor_quantico:/rails
      - /rails/node_modules
      - /usr/local/bundle
      - ./data:/rails/data
    ports: ["3000:3000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - RAILS_ENV=development
      - POLARS_SKIP_CPU_CHECK=1 # <-- Garante o Rails/Ruby
      - DB_HOST=postgres
      - DB_USER=devildev
      - DB_PASSWORD=password_quantica
      - DATABASE_URL=postgres://devildev:password_quantica@postgres:5432/hiperplano_db
    networks: [fenda_sinaptica]

  # 4. O MÚSCULO: Entrega em Alta Performance (Go)
  go_worker:
    build:
      context: .
      dockerfile: ./go-worker/Dockerfile
    container_name: go_entrega
    ports: ["8080:8080"]
    depends_on: [postgres]
    environment:
      - DB_URL=postgres://devildev:password_quantica@postgres:5432/hiperplano_db?sslmode=disable
    networks: [fenda_sinaptica]

  # 5. O ANALISADOR: Especialista de Fase (Python + MXNet)
  python_analyser:
    build:
      context: .
      dockerfile: ./python-analyser/Dockerfile
    container_name: python_expert
    volumes:
      - ./data:/app/data
    environment:
      - POLARS_SKIP_CPU_CHECK=1 # <-- Garante o Especialista Python
    networks: [fenda_sinaptica]
      fenda_sinaptica:
        driver: bridge


